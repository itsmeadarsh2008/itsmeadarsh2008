name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ github.token }}
          user: itsmeadarsh2008
          template: classic
          base: header, activity, community, repositories, metadata
          base_hireable: yes
          config_timezone: Asia/Kolkata
          config_twemoji: yes
          config_animations: yes
          config_padding: 10, 10

          # 📅 Isometric commit calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # 🈷️ Languages
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_limit: 8
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used, recently-used
          plugin_languages_indepth: yes
          plugin_languages_recent_days: 30

          # ⏰ Coding habits
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 30
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes

          # 📰 Recent activity
          plugin_activity: yes
          plugin_activity_limit: 10
          plugin_activity_days: 0
          plugin_activity_filter: all
          plugin_activity_visibility: all
          plugin_activity_timestamps: yes

          # 🎟️ Issues/PRs follow-up
          plugin_followup: yes
          plugin_followup_sections: repositories
          plugin_followup_indepth: yes
          plugin_followup_archived: yes

          # 🏆 Achievements
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed
          plugin_achievements_limit: 0

          # ✨ Stargazers
          plugin_stargazers: yes
          plugin_stargazers_charts: yes
          plugin_stargazers_charts_type: classic
          plugin_stargazers_worldmap: yes
          plugin_stargazers_days: 365

          # 👨‍💻 Lines of code changed
          plugin_lines: yes
          plugin_lines_sections: base, repositories
          plugin_lines_repositories_limit: 4
          plugin_lines_history_limit: 1

          # 📌 Starred topics
          plugin_topics: yes
          plugin_topics_mode: starred
          plugin_topics_sort: stars
          plugin_topics_limit: 12

          # 🌟 Recently starred repos
          plugin_stars: yes
          plugin_stars_limit: 4

          # 📆 Commit calendar
          plugin_calendar: yes
          plugin_calendar_limit: 1

          # 🎩 Notable contributions
          plugin_notable: yes
          plugin_notable_types: commit, pull_request
          plugin_notable_self: yes
          plugin_notable_from: all

          # 🧑‍🤝‍🧑 People (followers)
          plugin_people: yes
          plugin_people_limit: 24
          plugin_people_shuffle: yes
          plugin_people_types: followers, following

          # 📓 Featured repositories
          plugin_repositories: yes
          plugin_repositories_featured: itsmeadarsh2008
          plugin_repositories_order: stars, description

          # 🎭 Comment reactions
          plugin_reactions: yes
          plugin_reactions_limit: 100
          plugin_reactions_days: 0
          plugin_reactions_details: count

          # 💬 Discussions
          plugin_discussions: yes
          plugin_discussions_categories: yes
          plugin_discussions_categories_limit: 4

          # 🧮 Repositories traffic
          plugin_traffic: yes

          # 🗂️ Projects
          plugin_projects: yes
          plugin_projects_limit: 4

          # 💡 Random code snippet
          plugin_code: yes
          plugin_code_lines: 12
          plugin_code_load: 100
          plugin_code_visibility: public
          plugin_code_languages: python, javascript, typescript, rust, zig

          # 🩷 GitHub Sponsors
          plugin_sponsorships: yes
          plugin_sponsorships_sections: goal, list

          # 🎫 Gists
          plugin_gists: yes

          # 🏅 Repository contributors
          plugin_contributors: yes
          plugin_contributors_contributions: yes
          plugin_contributors_sections: contributors
          plugin_contributors_categories: core

          # 💫 Star lists
          plugin_starlists: yes
          plugin_starlists_limit: 2
          plugin_starlists_languages: yes

          # 🌇 GitHub Skyline (3D)
          plugin_skyline: yes
          plugin_skyline_year: 2025
          plugin_skyline_frames: 60
          plugin_skyline_quality: 1

          # 🙋 Introduction
          plugin_introduction: yes
          plugin_introduction_title: yes

          # 📜 Repository licenses
          plugin_licenses: yes
          plugin_licenses_setup: bundles
          plugin_licenses_ratio: yes
          plugin_licenses_legal: yes
